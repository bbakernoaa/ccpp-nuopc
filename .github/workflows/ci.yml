name: CCPP NUOPC CI

on:
  push:
    branches: [ main, 'feat/**' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gfortran libnetcdf-dev libnetcdff-dev

    - name: Install ESMF
      uses: esmf-org/install-esmf-action@v1
      env:
        ESMF_NETCDF: nc-config

    - name: Build and Syntax Check
      run: |
        echo "Verifying file existence and structure..."
        ls -R src/

        echo "Syntax check for internal state..."
        # We need to include the ESMF module path which the action sets up
        gfortran -fsyntax-only -I$ESMF_ROOT/mod src/ccpp_internal_state.F90

        echo "Syntax check for NUOPC cap..."
        # Note: NUOPC modules are also in the ESMF mod directory
        gfortran -fsyntax-only -I$ESMF_ROOT/mod src/ccpp_nuopc_cap.F90

        echo "CI workflow configured to monitor src/ directory."
