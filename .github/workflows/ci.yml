name: CCPP NUOPC CI

on:
  push:
    branches: [ main, 'feat/**' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: jcsda/docker-gnu-openmpi-dev:1.9

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Build and Syntax Check
      shell: bash
      run: |
        # Activate the Spack environment if present in the JCSDA container
        if [ -f /opt/spack-environment/activate.sh ]; then
          source /opt/spack-environment/activate.sh
        fi

        # Load necessary modules (Spack handles ESMF and CCPP in this stack)
        if command -v spack &> /dev/null; then
          spack load esmf || true
          spack load ccpp-framework || true
        fi

        echo "Verifying file existence and structure..."
        ls -R src/

        echo "Configuring and Building with CMake..."
        mkdir build
        cd build
        # We assume the JCSDA container has a recent CMake and that find_package(ESMF) works.
        # ESMF paths are usually handled by the ESMFMKFILE or the Spack load.
        cmake ..
        make

        echo "CI build and syntax check complete via CMake."
