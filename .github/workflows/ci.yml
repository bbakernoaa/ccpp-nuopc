name: CCPP NUOPC CI

on:
  push:
    branches: [ main, 'feat/**' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: jcsda/docker-gnu-openmpi-dev:1.9

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Build and Syntax Check
      shell: bash
      run: |
        # Activate the Spack environment if present in the JCSDA container
        if [ -f /opt/spack-environment/activate.sh ]; then
          source /opt/spack-environment/activate.sh
        fi

        # Load necessary modules (Spack handles ESMF and CCPP in this stack)
        if command -v spack &> /dev/null; then
          spack load esmf || true
          spack load ccpp-framework || true
        fi

        # Extract include paths from ESMFMKFILE (esmf.mk)
        if [ -n "$ESMFMKFILE" ] && [ -f "$ESMFMKFILE" ]; then
          echo "ESMFMKFILE found at: $ESMFMKFILE"
          # Extract the ESMF_F90COMPILEPATHS line and take its value
          ESMF_INC=$(grep "^ESMF_F90COMPILEPATHS =" "$ESMFMKFILE" | cut -d'=' -f2- | xargs)
          echo "ESMF include paths from ESMFMKFILE: $ESMF_INC"
        else
          echo "ESMFMKFILE not set or not found, attempting fallback to Spack location."
          ESMF_PATH=$(spack location -i esmf)
          ESMF_INC="-I$(find $ESMF_PATH -name "esmf.mod" -printf '%h\n' | head -n 1)"
        fi

        echo "Verifying file existence and structure..."
        ls -R src/

        echo "Syntax check for internal state..."
        gfortran -fsyntax-only $ESMF_INC src/ccpp_internal_state.F90

        echo "Syntax check for NUOPC cap..."
        # We need the module from ccpp_internal_state.F90, so we compile it first.
        # Ensure the current directory is in the include path for the generated .mod file.
        gfortran -c $ESMF_INC src/ccpp_internal_state.F90
        gfortran -fsyntax-only $ESMF_INC -I. src/ccpp_nuopc_cap.F90

        echo "CI workflow configured to use ESMFMKFILE with improved include extraction."
